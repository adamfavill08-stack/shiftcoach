apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'

// Load keystore properties from local file (gitignored)
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.shiftcoach.app"
    buildFeatures {
        buildConfig true
    }
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.shiftcoach.app"
        // Health Connect client requires API 26+ (watch pipeline: phone reads HC → backend).
        minSdkVersion 26
        targetSdkVersion rootProject.ext.targetSdkVersion
        // Bump these for every Play Store upload. versionCode must be unique and increasing.
        // Closed testing was already at 12 (1.0.10); next upload must exceed that versionCode.
        versionCode 17
        versionName "1.0.15"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                storeFile file(keystoreProperties['MYAPP_RELEASE_STORE_FILE'] ?: 'shiftcoach-release.keystore')
                storePassword keystoreProperties['MYAPP_RELEASE_STORE_PASSWORD']
                keyAlias keystoreProperties['MYAPP_RELEASE_KEY_ALIAS']
                keyPassword keystoreProperties['MYAPP_RELEASE_KEY_PASSWORD']
            }
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    kotlinOptions {
        jvmTarget = "21"
    }

    buildTypes {
        debug {
            minifyEnabled false
            // Verbose ShiftCoachHC logcat + extra fields on getStatus (no health sample values).
            buildConfigField "boolean", "HC_VERBOSE_LOG", "true"
        }
        release {
            // Enable minification and code shrinking for production
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
            buildConfigField "boolean", "HC_VERBOSE_LOG", "false"
        }
    }
}

repositories {
    // flatDir is required by Capacitor for local plugin dependencies
    // Note: Android Studio shows a warning about flatDir, but this is necessary
    // for Capacitor's plugin system to work correctly. This warning can be safely ignored.
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.25"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1"
    implementation "androidx.health.connect:connect-client:1.1.0"
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation "com.google.android.gms:play-services-wearable:18.2.0"
    implementation "com.google.android.play:review:2.0.2"
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
